name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Scope per-job so a rapid push only cancels the same job on the old
  # commit, not other jobs.  Cross-job cancellation left a `cancelled`
  # status on required checks, which branch protection treats as pending
  # and deadlocks the PR until the next push.
  group: ci-${{ github.ref }}-${{ github.job }}
  cancel-in-progress: true

jobs:
  lint-types-tests:
    name: lint + types + tests (py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dev deps
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .
      - name: mypy
        run: uv run mypy
      - name: pytest
        run: uv run pytest

  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Sync dev deps
        run: uv sync --extra dev
      - name: pre-commit run --all-files
        run: uv run pre-commit run --all-files
