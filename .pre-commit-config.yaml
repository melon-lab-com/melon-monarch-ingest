minimum_pre_commit_version: "3.8.0"
default_install_hook_types: [pre-commit]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # Vendored JS must stay byte-identical to the upstream CDN
        # drop so `tests/unit/web/test_vendor_integrity.py` SHA check
        # matches `version.lock`.
        exclude: ^src/monarch_cfo/web/static/vendor/.*\.(js|min\.js)$
      - id: end-of-file-fixer
        exclude: ^src/monarch_cfo/web/static/vendor/.*\.(js|min\.js)$
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: ^src/monarch_cfo/web/static/vendor/.*\.(js|min\.js)$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml"]
        additional_dependencies:
          - "pytest>=8.0"
          - "sqlalchemy>=2.0.36"
          - "alembic>=1.13"
          - "pydantic>=2.7"
          - "pydantic-settings>=2.3"
          - "hypothesis>=6.100"
          - "typer>=0.12"
          - "fastapi>=0.115"
          - "httpx>=0.27"

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # Local guards
  - repo: local
    hooks:
      - id: block-real-monarch-csv
        name: Block real Monarch CSV exports (Transactions_*.csv / Balances_*.csv)
        entry: python3 scripts/block_real_monarch_csv.py
        language: system
        pass_filenames: true
        types: [file]
